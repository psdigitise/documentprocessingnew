{% extends 'base.html' %}

{% block title %}Create Client - DocPro Admin{% endblock %}

{% block content %}
<div class="ac-theme-red-black"
    style="max-width: 600px; margin: 0 auto; padding: 2rem; border-radius: var(--ac-radius);">
    <div style="margin-bottom: 2rem;">
        <h1 style="margin: 0; font-size: 1.75rem;">Register New Client</h1>
        <p class="text-muted">Create a new client account for document submission.</p>
    </div>

    <div class="card ac-theme-red-black" style="border: none;">
        <div class="card-body" style="padding: 0;">
            <form id="create-client-form" novalidate>
                {% csrf_token %}
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Enter username" required
                        maxlength="150" autocomplete="off">
                    <div class="invalid-feedback" id="error-username"></div>
                </div>

                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-control" placeholder="name@example.com" required
                        autocomplete="off">
                    <div class="invalid-feedback" id="error-email"></div>
                </div>

                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label class="form-label">Create Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Minimum 8 characters"
                        required autocomplete="new-password">
                    <div class="invalid-feedback" id="error-password"></div>
                </div>

                <input type="hidden" name="role" value="CLIENT">

                <div style="margin-top: 2.5rem;">
                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.75rem;">Create Client
                        Account</button>
                    <a href="{% url 'admin_panel:client_list' %}" class="btn btn-secondary"
                        style="width: 100%; padding: 0.75rem; margin-top: 0.5rem; text-align: center; display: block; text-decoration: none;">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    const form = document.getElementById('create-client-form');

    function clearErrors() {
        form.querySelectorAll('.is-invalid').forEach(el => el.classList.remove('is-invalid'));
        form.querySelectorAll('.invalid-feedback').forEach(el => el.innerText = '');
    }

    function showError(fieldName, message) {
        const input = form.querySelector(`[name="${fieldName}"]`);
        const feedback = form.querySelector(`#error-${fieldName}`);
        if (input) input.classList.add('is-invalid');
        if (feedback) feedback.innerText = message;
    }

    function removeError(fieldName) {
        const input = form.querySelector(`[name="${fieldName}"]`);
        const feedback = form.querySelector(`#error-${fieldName}`);
        if (input) input.classList.remove('is-invalid');
        if (feedback) feedback.innerText = '';
    }

    // Live Validation Listeners
    form.querySelector('[name="username"]').addEventListener('input', (e) => {
        const val = e.target.value;
        if (val.length > 0 && val.length < 4) {
            showError('username', 'Username must be at least 4 characters.');
        } else if (val.length >= 4) {
            const regex = /^[a-zA-Z0-9_]+$/; // Corrected regex for username
            if (!regex.test(val)) {
                showError('username', 'Only letters, numbers, and underscores allowed.');
            } else {
                removeError('username');
            }
        } else {
            removeError('username');
        }
    });

    form.querySelector('[name="email"]').addEventListener('input', (e) => {
        const val = e.target.value;
        const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (val.length > 0 && !regex.test(val)) {
            showError('email', 'Please enter a valid email address.');
        } else {
            removeError('email');
        }
    });

    form.querySelector('[name="password"]').addEventListener('input', (e) => {
        const val = e.target.value;
        if (val.length > 0 && val.length < 8) {
            showError('password', 'Password must be at least 8 characters.');
        } else {
            removeError('password');
        }
    });

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        clearErrors();

        const btn = e.target.querySelector('button[type="submit"]');
        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());

        // Final Client-side validation check
        let hasError = false;

        // Required checks
        if (!data.username) { showError('username', 'Username is required.'); hasError = true; }
        if (!data.email) { showError('email', 'Email is required.'); hasError = true; }
        if (!data.password) { showError('password', 'Password is required.'); hasError = true; }

        if (hasError) { return; }

        // Username check
        if (data.username.length < 4) {
            showError('username', 'Username is too short.');
            hasError = true;
        } else if (!/^[a-zA-Z0-9_]+$/.test(data.username)) {
            showError('username', 'Invalid username format.');
            hasError = true;
        }

        // Email check
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(data.email)) {
            showError('email', 'Invalid email address.');
            hasError = true;
        }

        // Password check
        if (data.password.length < 8) {
            showError('password', 'Password too short.');
            hasError = true;
        }

        if (hasError) { return; }

        btn.disabled = true;
        const originalBtnText = btn.innerText;
        btn.innerText = 'Creating...';

        try {
            const response = await fetch('/api/v1/auth/users/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
                },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                // SUCCESS: 200-299
                localStorage.setItem('docpro_toast_message', 'Client account created successfully!');
                localStorage.setItem('docpro_toast_type', 'success');
                e.target.reset();
                window.location.href = "{% url 'admin_panel:client_list' %}";
            } else {
                // ERROR: 400 or other
                const err = await response.json();

                if (response.status === 400) {
                    let handledInline = false;
                    Object.keys(err).forEach(field => {
                        const messages = err[field];
                        if (form.querySelector(`[name="${field}"]`)) {
                            showError(field, Array.isArray(messages) ? messages[0] : messages);
                            handledInline = true;
                        }
                    });

                    if (!handledInline) {
                        showToast(err.detail || err.non_field_errors?.[0] || 'Validation failed. Please check inputs.', 'error');
                    }
                } else {
                    showToast(err.detail || 'Failed to create client. Please check inputs.', 'error');
                }
            }
        } catch (error) {
            showToast('Connection error.', 'error');
        } finally {
            btn.disabled = false;
            btn.innerText = originalBtnText;
        }
    });
</script>
{% endblock %}
