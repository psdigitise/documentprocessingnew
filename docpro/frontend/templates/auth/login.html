{% extends 'base.html' %}
{% load static %}
 
{% block title %}Login - XBERRA Tagger{% endblock %}
 
{% block content %}
<div class="layout-centered" style="align-items: center; min-height: calc(100vh - 80px); padding: 2rem;">
    <div class="glass-panel" style="width: 100%; max-width: 420px; padding: 3rem 2.5rem; display: flex; flex-direction: column;   align-items: center;">
        <div class="text-center" style="margin-bottom: 2rem; width: 100%;">
            <div style="margin-bottom: 2rem; display: flex; justify-content: center;">
                <img src="{% static 'img/logo.png' %}" alt="XBERRA TAGGER" style="max-width: 280px; height: auto; display: block;">
            </div>
            <p class="text-muted" style="margin: 0; font-size: 0.9375rem; font-weight: 500;">Please sign in to your account</p>
        </div>
 
        <form id="login-form" method="post" action="{% url 'login' %}" novalidate style="width: 100%;">
            {% csrf_token %}
 
            {% if form.non_field_errors %}
            <div class="alert alert-error"
                style="margin-bottom: 1.5rem; background: #fee2e2; color: #dc2626; padding: 0.75rem; border-radius: var(--radius); font-size: 0.875rem;">
                {% for error in form.non_field_errors %}
                {{ error }}
                {% endfor %}
            </div>
            {% endif %}
 
            <div class="form-group">
                <label for="id_username" class="form-label">Username</label>
                <input type="text" name="username" autofocus maxlength="254" required id="id_username"
                    class="form-control" placeholder="Enter your username" autocomplete="username">
                <div class="invalid-feedback" id="error-username"></div>
            </div>
 
            <div class="form-group" style="margin-top: 1.25rem;">
                <label for="id_password" class="form-label">Password</label>
                <input type="password" name="password" required id="id_password" class="form-control"
                    placeholder="••••••••" autocomplete="current-password">
                <div class="invalid-feedback" id="error-password"></div>
            </div>
 
            <button type="submit" class="btn btn-primary btn-block"
                style="margin-top: 2rem; justify-content: center; width: 100%;">
                Sign In
            </button>
        </form>
 
        <script>
            const form = document.getElementById('login-form');
 
            function showError(fieldName, message) {
                const input = form.querySelector(`[name="${fieldName}"]`);
                const feedback = form.querySelector(`#error-${fieldName}`);
                if (input) input.classList.add('is-invalid');
                if (feedback) feedback.innerText = message;
            }
 
            function removeError(fieldName) {
                const input = form.querySelector(`[name="${fieldName}"]`);
                const feedback = form.querySelector(`#error-${fieldName}`);
                if (input) input.classList.remove('is-invalid');
                if (feedback) feedback.innerText = '';
            }
 
            // Live Validation
            form.querySelectorAll('input').forEach(input => {
                input.addEventListener('input', (e) => {
                    if (e.target.value.trim() !== '') {
                        removeError(e.target.name);
                    }
                });
            });
 
            form.addEventListener('submit', (e) => {
                let hasError = false;
                const username = form.querySelector('[name="username"]');
                const password = form.querySelector('[name="password"]');
 
                if (!username.value.trim()) {
                    showError('username', 'Username is required.');
                    hasError = true;
                }
                if (!password.value.trim()) {
                    showError('password', 'Password is required.');
                    hasError = true;
                }
 
                if (hasError) {
                    e.preventDefault();
                } else {
                    const btn = form.querySelector('button');
                    btn.disabled = true;
                    btn.innerText = 'Signing In...';
                }
            });
        </script>
    </div>
</div>
{% endblock %}
