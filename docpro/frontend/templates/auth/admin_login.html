{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="auth-page admin-auth">
    <div class="layout-centered" style="background: radial-gradient(circle at center, #111827 0%, #000000 100%); align-items: center; min-height: 100vh;">
        <div class="glass-panel animate-auth" 
             style="width: 100%; max-width: 440px; padding: 3.5rem 3rem; background: rgba(17, 24, 39, 0.8); border: 1px solid rgba(220, 38, 38, 0.3); box-shadow: 0 0 40px rgba(220, 38, 38, 0.1);">
            
            <div class="auth-header">
                <div class="auth-logo-box">
                    <img src="{% static 'img/logo.png' %}" alt="XBERRA TAGGER" style="filter: brightness(0) invert(1);">
                </div>
                <h1 class="auth-title" style="color: #fff;">Admin Console</h1>
                <p class="auth-subtitle" style="color: #9ca3af;">Authorized personnel only</p>
            </div>

            <form method="post" action="{% url 'login' %}?next=/admin/users/" novalidate>
                {% csrf_token %}

                {% if form.non_field_errors %}
                <div class="alert alert-error" style="background: rgba(220, 38, 38, 0.1); border-color: rgba(220, 38, 38, 0.2); color: #f87171;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                        <line x1="12" y1="9" x2="12" y2="13"></line>
                        <line x1="12" y1="17" x2="12.01" y2="17"></line>
                    </svg>
                    Invalid administrative credentials.
                </div>
                {% endif %}

                <div class="form-group">
                    <label for="id_username" class="form-label" style="color: #d1d5db;">Admin Username</label>
                    <div class="search-input-wrap">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: #6b7280;">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                        </svg>
                        <input type="text" name="username" autofocus maxlength="254" required id="id_username"
                            class="form-control" style="background: #030712; border-color: #374151; color: #fff;" 
                            placeholder="admin_id" autocomplete="username">
                    </div>
                </div>

                <div class="form-group" style="margin-top: 1.5rem;">
                    <label for="id_password" class="form-label" style="color: #d1d5db;">Secure Key</label>
                    <div class="search-input-wrap">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: #6b7280;">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <input type="password" name="password" required id="id_password" class="form-control"
                            style="background: #030712; border-color: #374151; color: #fff;" 
                            placeholder="••••••••" autocomplete="current-password">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-block" 
                        style="margin-top: 2.5rem; height: 3.5rem; font-size: 1rem; text-transform: uppercase; letter-spacing: 0.05em; border-radius: 4px;">
                    Initiate Authentication
                </button>

                <div style="margin-top: 2rem; text-align: center;">
                    <a href="{% url 'home' %}" class="btn-ghost" style="color: #6b7280; font-size: 0.8125rem;">
                        &larr; Return to Secure Gateway
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
