<!-- Alert System Include: To be added once at the bottom of base.html -->
<div id="alert-container" aria-live="polite" aria-atomic="false" style="
       position: fixed;
       top: 80px;
       right: 20px;
       z-index: 9999;
       display: flex;
       flex-direction: column;
       gap: 12px;
       max-width: 400px;
       width: calc(100% - 40px);
       pointer-events: none;
     ">
</div>

<style>
    .alert-toast {
        display: flex;
        align-items: flex-start;
        gap: 14px;
        padding: 16px 20px;
        border-radius: 12px;
        border: 1px solid transparent;
        font-family: 'Inter', sans-serif;
        font-size: 14px;
        line-height: 1.5;
        pointer-events: auto;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15),
            0 1px 8px rgba(0, 0, 0, 0.1);
        transform: translateX(110%);
        opacity: 0;
        transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
            opacity 0.3s ease;
        position: relative;
        overflow: hidden;
        background: #fff;
    }

    .alert-toast.show {
        transform: translateX(0);
        opacity: 1;
    }

    .alert-toast.hiding {
        transform: translateX(110%);
        opacity: 0;
    }

    /* Progress bar */
    .alert-toast::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        height: 4px;
        background: currentColor;
        opacity: 0.2;
        animation: alertProgress var(--duration, 4000ms) linear forwards;
    }

    @keyframes alertProgress {
        from {
            width: 100%;
        }

        to {
            width: 0%;
        }
    }

    /* Types */
    .alert-success {
        background: #f0fdf4;
        border-color: rgba(34, 197, 94, 0.3);
        color: #15803d;
    }

    .alert-error {
        background: #fef2f2;
        border-color: rgba(239, 68, 68, 0.3);
        color: #b91c1c;
    }

    .alert-warning {
        background: #fffbeb;
        border-color: rgba(245, 158, 11, 0.3);
        color: #92400e;
    }

    .alert-info {
        background: #eff6ff;
        border-color: rgba(59, 130, 246, 0.3);
        color: #1d4ed8;
    }

    /* Dark theme variants (if high contrast or dark mode detected) */
    @media (prefers-color-scheme: dark) {
        .alert-success {
            background: #052e16;
            border-color: rgba(34, 197, 94, 0.25);
            color: #4ade80;
        }

        .alert-error {
            background: #450a0a;
            border-color: rgba(239, 68, 68, 0.25);
            color: #f87171;
        }

        .alert-warning {
            background: #422006;
            border-color: rgba(245, 158, 11, 0.25);
            color: #fbbf24;
        }

        .alert-info {
            background: #0c1a3a;
            border-color: rgba(59, 130, 246, 0.25);
            color: #60a5fa;
        }
    }

    .alert-icon {
        font-size: 18px;
        flex-shrink: 0;
        margin-top: 1px;
    }

    .alert-body {
        flex: 1;
    }

    .alert-title {
        font-weight: 700;
        margin-bottom: 2px;
        font-size: 14px;
    }

    .alert-msg {
        font-size: 13px;
        opacity: 0.9;
    }

    .alert-close {
        flex-shrink: 0;
        width: 24px;
        height: 24px;
        background: transparent;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        color: inherit;
        opacity: 0.5;
        transition: all 0.2s;
        margin: -4px -4px 0 0;
    }

    .alert-close:hover {
        opacity: 1;
        background: rgba(0, 0, 0, 0.05);
    }
</style>

<script>
    // ── Alert System Utility ───────────────────────────────────────
    const ALERT_ICONS = {
        success: '<i class="fas fa-check-circle"></i>',
        error: '<i class="fas fa-times-circle"></i>',
        warning: '<i class="fas fa-exclamation-triangle"></i>',
        info: '<i class="fas fa-info-circle"></i>',
    };

    const ALERT_TITLES = {
        success: 'Success',
        error: 'Error',
        warning: 'Warning',
        // info:    'Information',
    };

    const ALERT_DURATIONS = {
        success: 4000,
        error: 7000,   // Errors persist longer
        warning: 5000,
        info: 4000,
    };

    /**
     * showAlert(type, message, title, duration)
     * Replaces standard browser alert() with professional toasts.
     */
    window.showAlert = function (type, message, title = '', duration = null) {
        const container = document.getElementById('alert-container');
        if (!container) {
            console.warn('[Alert]', type, message);
            return;
        }

        // Normalize type
        if (!['success', 'error', 'warning', 'info'].includes(type)) {
            type = 'info';
        }

        const ms = duration !== null ? duration : ALERT_DURATIONS[type];
        const icon = ALERT_ICONS[type];
        const heading = title || ALERT_TITLES[type];

        const toast = document.createElement('div');
        toast.className = `alert-toast alert-${type}`;
        toast.role = 'alert';
        toast.setAttribute('aria-live', 'assertive');
        toast.style.setProperty('--duration', ms + 'ms');

        toast.innerHTML = `
            <div class="alert-icon" aria-hidden="true">${icon}</div>
            <div class="alert-body">
                <div class="alert-title">${escapeHtml(heading)}</div>
                <div class="alert-msg">${escapeHtml(message)}</div>
            </div>
            <button class="alert-close" aria-label="Dismiss notification">
                <i class="fas fa-times"></i>
            </button>
        `;

        // Attachment manually so we can handle the close button
        const closeBtn = toast.querySelector('.alert-close');
        closeBtn.onclick = () => window.dismissAlert(toast);

        container.appendChild(toast);

        // Animate in using requestAnimationFrame for smooth transition
        requestAnimationFrame(() => {
            requestAnimationFrame(() => toast.classList.add('show'));
        });

        // Auto-dismiss logic
        if (ms > 0) {
            setTimeout(() => window.dismissAlert(toast), ms);
        }

        return toast;
    };

    window.dismissAlert = function (toast) {
        if (!toast || toast._dismissing) return;
        toast._dismissing = true;
        toast.classList.remove('show');
        toast.classList.add('hiding');
        setTimeout(() => toast.remove(), 400);
    };

    function escapeHtml(str) {
        const d = document.createElement('div');
        d.textContent = str;
        return d.innerHTML;
    }

    // Map old showToast to new showAlert for backward compatibility
    window.showToast = function (message, type = 'success', duration = null) {
        return window.showAlert(type, message, '', duration);
    };
</script>
